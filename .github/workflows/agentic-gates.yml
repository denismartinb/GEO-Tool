name: Agentic Gates

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number under human review
        required: false
  pull_request_review:
    types:
      - submitted

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: agentic-gates-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  gate:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Capture gate context
        id: context
        run: |
          set -euo pipefail
          pr_number="${{ github.event.inputs.pr_number || github.event.pull_request.number || '' }}"
          review_state="${{ github.event.review.state || '' }}"
          should_run="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            should_run="true"
          elif [ "$review_state" = "approved" ] || [ "$review_state" = "changes_requested" ]; then
            should_run="true"
          fi
          {
            echo "pr_number=$pr_number"
            echo "review_state=$review_state"
            echo "should_run=$should_run"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize gate state
        run: |
          {
            echo "## Agentic Gates"
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- PR: ${{ steps.context.outputs.pr_number || 'n/a' }}"
            echo "- Review state: ${{ steps.context.outputs.review_state || 'n/a' }}"
            echo "- Human approval required before merge: yes"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip when not requested
        if: steps.context.outputs.should_run != 'true'
        run: |
          echo "Human gate workflow skipped because no approved or changes-requested review event was provided."

      - name: Human gate reminder
        if: steps.context.outputs.should_run == 'true'
        run: |
          {
            echo "Human review remains mandatory."
            echo "This workflow does not merge or deploy anything."
            echo "Denis must approve, reject, or request another iteration."
          } >> "$GITHUB_STEP_SUMMARY"
