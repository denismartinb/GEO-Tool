name: Claude QA

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: true
  pull_request_target:
    types:
      - labeled

permissions:
  contents: read
  issues: write
  pull-requests: write

concurrency:
  group: claude-qa-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  qa:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      (
        github.event.pull_request.head.repo.full_name == github.repository &&
        (
          github.event.label.name == 'agent:qa' ||
          github.event.label.name == 'agent:claude-qa' ||
          github.event.label.name == 'status:ready-for-qa'
        )
      )
    runs-on: ubuntu-latest
    env:
      ANTHROPIC_API_KEY_PRESENT: ${{ secrets.ANTHROPIC_API_KEY != '' }}
    steps:
      - name: Check out trusted base repository
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_dispatch' && github.ref || github.event.repository.default_branch }}

      - name: Resolve pull request context
        id: context
        run: |
          set -euo pipefail
          pr_number="${{ github.event.inputs.pr_number || github.event.pull_request.number || '' }}"
          if [ -z "$pr_number" ]; then
            echo "No PR number found for Claude QA." >&2
            exit 1
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Summarize Claude QA start
        run: |
          {
            echo "## Claude QA"
            echo
            echo "- PR: #${{ steps.context.outputs.pr_number }}"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Action: execute Claude QA from PR handoff comment"
            echo "- Safety: trusted base checkout only; PR head code is not executed"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip when Anthropic secret is missing
        if: env.ANTHROPIC_API_KEY_PRESENT != 'true'
        run: |
          {
            echo "Claude QA did not run."
            echo "Missing required secret name: ANTHROPIC_API_KEY."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Execute Claude QA
        if: env.ANTHROPIC_API_KEY_PRESENT == 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CLAUDE_QA_MODEL: ${{ vars.CLAUDE_QA_MODEL || 'claude-sonnet-4-6' }}
          GH_TOKEN: ${{ github.token }}
          GITHUB_REPOSITORY: ${{ github.repository }}
        run: |
          python3 scripts/run-claude-qa.py "${{ steps.context.outputs.pr_number }}"
