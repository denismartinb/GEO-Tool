name: Claude QA

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to review
        required: false
  pull_request:
    types:
      - opened
      - synchronize
      - reopened
      - labeled

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: claude-qa-${{ github.event.pull_request.number || github.run_id }}
  cancel-in-progress: false

jobs:
  qa:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Capture pull request context
        id: context
        run: |
          set -euo pipefail
          pr_number="${{ github.event.inputs.pr_number || github.event.pull_request.number || '' }}"
          label_name="${{ github.event.label.name || '' }}"
          should_run="false"
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            should_run="true"
          elif [ "$label_name" = "agent:qa" ] || [ "$label_name" = "status:ready-for-build" ] || [ "$label_name" = "status:changes-requested" ]; then
            should_run="true"
          fi
          {
            echo "pr_number=$pr_number"
            echo "label_name=$label_name"
            echo "should_run=$should_run"
          } >> "$GITHUB_OUTPUT"

      - name: Summarize QA preflight
        run: |
          {
            echo "## Claude QA"
            echo
            echo "- Trigger: ${{ github.event_name }}"
            echo "- PR: ${{ steps.context.outputs.pr_number || 'n/a' }}"
            echo "- Label: ${{ steps.context.outputs.label_name || 'n/a' }}"
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Skip when not requested
        if: steps.context.outputs.should_run != 'true'
        run: |
          echo "QA workflow skipped because no QA trigger label or dispatch input was provided."

      - name: Skip when Claude secret is missing
        if: steps.context.outputs.should_run == 'true' && secrets.CLAUDE_QA_TOKEN == ''
        run: |
          {
            echo "Claude QA placeholder skipped."
            echo "Missing required secret: CLAUDE_QA_TOKEN."
            echo "The workflow remains a conservative placeholder until an external reviewer integration is configured."
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Placeholder review guard
        if: steps.context.outputs.should_run == 'true' && secrets.CLAUDE_QA_TOKEN != ''
        run: |
          {
            echo "Claude QA placeholder is enabled."
            echo "No implementation changes are made here."
            echo "Use this job to produce review notes, not fixes."
          } >> "$GITHUB_STEP_SUMMARY"
