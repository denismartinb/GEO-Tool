name: Claude QA Handoff

on:
  workflow_dispatch:
    inputs:
      pr_number:
        description: Pull request number to prepare for Claude QA
        required: true
  pull_request_target:
    types:
      - labeled

permissions:
  contents: read
  pull-requests: write
  issues: write

concurrency:
  group: claude-qa-handoff-${{ github.event.pull_request.number || github.event.inputs.pr_number || github.run_id }}
  cancel-in-progress: false

jobs:
  handoff:
    if: >-
      github.event_name == 'workflow_dispatch' ||
      github.event.label.name == 'status:ready-for-qa' ||
      github.event.label.name == 'agent:claude-qa'
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up GitHub CLI authentication
        run: echo "GH_TOKEN=${{ github.token }}" >> "$GITHUB_ENV"

      - name: Resolve pull request number
        id: context
        run: |
          set -euo pipefail
          pr_number="${{ github.event.inputs.pr_number || github.event.pull_request.number || '' }}"
          if [ -z "$pr_number" ]; then
            echo "No PR number found for handoff." >&2
            exit 1
          fi
          echo "pr_number=$pr_number" >> "$GITHUB_OUTPUT"

      - name: Post Claude QA handoff comment
        run: |
          bash scripts/post-claude-qa-handoff.sh "${{ steps.context.outputs.pr_number }}"

      - name: Summarize workflow behavior
        run: |
          {
            echo "## Claude QA Handoff"
            echo
            echo "- PR: #${{ steps.context.outputs.pr_number }}"
            echo "- Action: generated and posted Claude QA handoff comment"
            echo "- Claude execution itself remains manual unless a separate integration is configured"
          } >> "$GITHUB_STEP_SUMMARY"
